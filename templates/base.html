<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>{% block title %} {% endblock title %}- my todo</title>


  <style>

body{
    background: linear-gradient(135deg,#ffd6e8,#d9e7ff);
    min-height:100vh;
    font-family: 'Poppins', sans-serif;
}

.todo-card{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

h2{
    color:#ff4f81;
    font-weight:bold;
}

.table{
    background:white;
    border-radius:15px;
    overflow:hidden;
}
input.form-control{
    border-radius:15px;
    padding:12px;
    border:1px solid #ffd6e8;
}

input.form-control:focus{
    box-shadow:0 0 10px #ffb6d9;
    border-color:#ff4f81;
}

.btn-dark{
    background:#ff4f81;
    border:none;
}

.btn-dark:hover{
    background:#ff2f6d;
    transform:scale(1.03);
    transition:0.3s;
}

.table{
    margin-top:20px;
    border-radius:20px;
    overflow:hidden;
}
</style>

</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-warning" href="/">✨ MyTodo</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
      data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">

        <li class="nav-item mx-2">
          <a class="nav-link active text-light" href="/">Home</a>
        </li>

        <li class="nav-item mx-2">
          <a class="nav-link text-light" href="#">About</a>
        </li>

      </ul>
    </div>
  </div>
</nav>
{% block body %}
  
{% endblock body %}
</body>

</html>
